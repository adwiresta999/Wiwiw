<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Data Karyawan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13; --surface: #16181f; --surface2: #1e2029;
    --border: #2a2d3a; --accent: #e8f04a; --accent2: #4af0b0;
    --text: #f0f1f5; --muted: #6b7090; --danger: #f04a6b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; padding:2rem; }

  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:2.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:1rem; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; letter-spacing:-0.03em; }
  .logo span { color:var(--accent); }
  .stats { display:flex; gap:2rem; font-size:0.75rem; color:var(--muted); }
  .stat-val { display:block; font-size:1.5rem; font-weight:500; color:var(--accent2); font-family:'Syne',sans-serif; }

  .btn { padding:0.6rem 1.2rem; border:none; border-radius:6px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:600; font-size:0.85rem; transition:all 0.2s; white-space:nowrap; }
  .btn-primary { background:var(--accent); color:#0e0f13; }
  .btn-primary:hover { background:#d4da3a; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent2); color:var(--accent2); }
  .btn-danger { background:transparent; color:var(--danger); border:1px solid var(--danger); font-size:0.75rem; padding:0.3rem 0.7rem; }
  .btn-danger:hover { background:var(--danger); color:white; }
  .btn-edit { background:transparent; color:var(--accent2); border:1px solid var(--accent2); font-size:0.75rem; padding:0.3rem 0.7rem; }
  .btn-edit:hover { background:var(--accent2); color:#0e0f13; }

  .toolbar { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  input[type="text"] { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.6rem 1rem; border-radius:6px; font-family:'DM Mono',monospace; font-size:0.85rem; outline:none; transition:border-color 0.2s; flex:1; min-width:200px; }
  input[type="text"]:focus { border-color:var(--accent); }

  /* Config banner */
  .config-banner { background:rgba(232,240,74,0.08); border:1px solid rgba(232,240,74,0.3); border-radius:10px; padding:1rem 1.5rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  .config-banner span { font-size:0.8rem; color:var(--accent); flex:1; min-width:200px; }
  .config-banner input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.5rem 0.8rem; border-radius:6px; font-family:'DM Mono',monospace; font-size:0.8rem; outline:none; width:100%; max-width:460px; }
  .config-banner input:focus { border-color:var(--accent); }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .overlay.active { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; width:100%; max-width:480px; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:1.5rem; color:var(--accent); }
  .form-group { margin-bottom:1rem; }
  .form-group label { display:block; font-size:0.7rem; color:var(--muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.08em; }
  .form-group input, .form-group select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.6rem 0.9rem; border-radius:6px; font-family:'DM Mono',monospace; font-size:0.85rem; outline:none; transition:border-color 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
  .form-group select option { background:var(--surface2); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .modal-footer { display:flex; gap:0.8rem; justify-content:flex-end; margin-top:1.5rem; }

  .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; }
  thead { background:var(--surface2); }
  th { padding:0.9rem 1rem; text-align:left; font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:500; border-bottom:1px solid var(--border); }
  td { padding:0.85rem 1rem; font-size:0.82rem; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(232,240,74,0.03); }

  .badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.7rem; font-weight:500; }
  .badge-aktif { background:rgba(74,240,176,0.12); color:var(--accent2); border:1px solid rgba(74,240,176,0.3); }
  .badge-nonaktif { background:rgba(240,74,107,0.12); color:var(--danger); border:1px solid rgba(240,74,107,0.3); }
  .action-btns { display:flex; gap:0.5rem; }
  .id-badge { font-size:0.7rem; color:var(--muted); background:var(--surface2); padding:0.1rem 0.4rem; border-radius:4px; }

  .loading { text-align:center; padding:3rem; color:var(--muted); }
  .spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:0.8rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { position:fixed; bottom:2rem; right:2rem; background:var(--accent); color:#0e0f13; padding:0.7rem 1.2rem; border-radius:8px; font-family:'Syne',sans-serif; font-weight:600; font-size:0.85rem; transform:translateY(100px); opacity:0; transition:all 0.3s ease; z-index:999; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { background:var(--danger); color:white; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">HR<span>_</span>Data</div>
    <div style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem;">Terhubung ke Google Sheets</div>
  </div>
  <div class="stats">
    <div><span class="stat-val" id="totalCount">-</span>Total Karyawan</div>
    <div><span class="stat-val" id="aktifCount">-</span>Aktif</div>
  </div>
</header>

<!-- Banner URL konfigurasi -->
<div class="config-banner">
  <span>🔗 Masukkan URL Google Apps Script kamu:</span>
  <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/XXXX/exec" oninput="simpanUrl()">
  <button class="btn btn-primary" onclick="loadData()">Sambungkan</button>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Cari nama, jabatan, divisi..." oninput="render()">
  <button class="btn btn-primary" onclick="openModal()">+ Tambah Karyawan</button>
  <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Nama</th><th>Jabatan</th><th>Divisi</th>
        <th>Email</th><th>No. HP</th><th>Gaji</th><th>Status</th><th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="9"><div class="loading"><div class="spinner"></div><div>Masukkan URL Apps Script untuk memulai...</div></div></td></tr>
    </tbody>
  </table>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Tambah Karyawan</div>
    <div class="form-row">
      <div class="form-group"><label>Nama Lengkap *</label><input type="text" id="fNama" placeholder="Budi Santoso"></div>
      <div class="form-group"><label>Jabatan *</label><input type="text" id="fJabatan" placeholder="Staff, Manager..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Divisi *</label><input type="text" id="fDivisi" placeholder="IT, HR, Finance..."></div>
      <div class="form-group"><label>No. HP</label><input type="text" id="fHP" placeholder="08xx-xxxx-xxxx"></div>
    </div>
    <div class="form-group"><label>Email</label><input type="text" id="fEmail" placeholder="email@perusahaan.com"></div>
    <div class="form-row">
      <div class="form-group"><label>Gaji (Rp)</label><input type="text" id="fGaji" placeholder="5000000"></div>
      <div class="form-group"><label>Status</label>
        <select id="fStatus"><option value="Aktif">Aktif</option><option value="Non-aktif">Non-aktif</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="btnSimpan" onclick="saveData()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let karyawan = [];
let editId = null;

// Simpan & load URL dari localStorage browser
function simpanUrl() {
  const url = document.getElementById('apiUrl').value.trim();
  localStorage.setItem('hr_api_url', url);
}
function getUrl() {
  return localStorage.getItem('hr_api_url') || '';
}

window.onload = () => {
  const saved = getUrl();
  if (saved) {
    document.getElementById('apiUrl').value = saved;
    loadData();
  }
};

async function api(params) {
  const url = getUrl();
  if (!url) { showToast('⚠ Masukkan URL Apps Script dulu!', true); return null; }

  try {
    if (params.method === 'GET') {
      const res = await fetch(`${url}?action=${params.action}`);
      return await res.json();
    } else {
      // Apps Script tidak mendukung CORS POST langsung — pakai no-cors workaround via form
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify(params.body),
      });
      return await res.json();
    }
  } catch (e) {
    showToast('❌ Gagal terhubung ke server. Cek URL Apps Script kamu.', true);
    return null;
  }
}

async function loadData() {
  document.getElementById('tableBody').innerHTML = `<tr><td colspan="9"><div class="loading"><div class="spinner"></div><div>Memuat data...</div></div></td></tr>`;
  const res = await api({ method: 'GET', action: 'getAll' });
  if (res && res.ok) {
    karyawan = res.data;
    render();
    showToast('✓ Data berhasil dimuat');
  }
}

function formatRp(val) {
  const n = parseInt(val) || 0;
  return 'Rp ' + n.toLocaleString('id-ID');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = karyawan.filter(d =>
    d.nama.toLowerCase().includes(q) ||
    d.jabatan.toLowerCase().includes(q) ||
    d.divisi.toLowerCase().includes(q)
  );
  document.getElementById('totalCount').textContent = karyawan.length;
  document.getElementById('aktifCount').textContent = karyawan.filter(d => d.status === 'Aktif').length;

  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="loading">📭 Tidak ada data</div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td><span class="id-badge">${d.id}</span></td>
      <td><strong>${d.nama}</strong></td>
      <td>${d.jabatan}</td>
      <td>${d.divisi}</td>
      <td>${d.email||'-'}</td>
      <td>${d.hp||'-'}</td>
      <td>${d.gaji ? formatRp(d.gaji) : '-'}</td>
      <td><span class="badge ${d.status==='Aktif'?'badge-aktif':'badge-nonaktif'}">${d.status}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn btn-edit" onclick="editData('${d.id}')">Edit</button>
          <button class="btn btn-danger" onclick="deleteData('${d.id}')">Hapus</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openModal(id=null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Karyawan' : 'Tambah Karyawan';
  if (id) {
    const d = karyawan.find(x => x.id === id);
    document.getElementById('fNama').value = d.nama;
    document.getElementById('fJabatan').value = d.jabatan;
    document.getElementById('fDivisi').value = d.divisi;
    document.getElementById('fEmail').value = d.email;
    document.getElementById('fHP').value = d.hp;
    document.getElementById('fGaji').value = d.gaji;
    document.getElementById('fStatus').value = d.status;
  } else {
    ['fNama','fJabatan','fDivisi','fEmail','fHP','fGaji'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fStatus').value='Aktif';
  }
  document.getElementById('overlay').classList.add('active');
}
function closeModal() { document.getElementById('overlay').classList.remove('active'); editId=null; }

async function saveData() {
  const body = {
    nama: document.getElementById('fNama').value.trim(),
    jabatan: document.getElementById('fJabatan').value.trim(),
    divisi: document.getElementById('fDivisi').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    hp: document.getElementById('fHP').value.trim(),
    gaji: document.getElementById('fGaji').value.trim(),
    status: document.getElementById('fStatus').value,
  };
  if (!body.nama || !body.jabatan || !body.divisi) { showToast('⚠ Nama, Jabatan, Divisi wajib diisi!', true); return; }

  const btn = document.getElementById('btnSimpan');
  btn.disabled = true; btn.textContent = 'Menyimpan...';

  const payload = editId
    ? { action: 'edit', id: editId, data: body }
    : { action: 'tambah', data: body };

  const res = await api({ method: 'POST', body: payload });
  btn.disabled = false; btn.textContent = 'Simpan';

  if (res && res.ok) {
    showToast(editId ? '✓ Data diperbarui' : '✓ Karyawan ditambahkan');
    closeModal();
    await loadData();
  }
}

function editData(id) { openModal(id); }

async function deleteData(id) {
  if (!confirm('Hapus data karyawan ini?')) return;
  const res = await api({ method: 'POST', body: { action: 'hapus', id } });
  if (res && res.ok) { showToast('✓ Data dihapus'); await loadData(); }
}

function exportCSV() {
  if (!karyawan.length) { showToast('⚠ Tidak ada data untuk diekspor', true); return; }
  const headers = ['ID','Nama','Jabatan','Divisi','Email','No. HP','Gaji','Status'];
  const rows = karyawan.map(d => [d.id,d.nama,d.jabatan,d.divisi,d.email,d.hp,d.gaji,d.status]);
  const csv = [headers,...rows].map(r=>r.map(v=>`"${v||''}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'data_karyawan.csv';
  a.click();
  showToast('✓ File CSV diunduh');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
</script>
</body>
</html>
